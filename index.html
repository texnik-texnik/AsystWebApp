<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Assistant Web</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196F3">
</head>
<body class="light-theme"> <!-- Тема по умолчанию -->

    <!-- Экран 1: Приветствие и Каталог -->
    <section id="screen-welcome" class="screen">
        <header class="main-header">
            <div class="header-top-row">
                <h1>Assistant</h1>
                <div class="header-actions">
                    <button id="theme-toggle" class="icon-btn" title="Сменить тему">🌓</button>
                    <label for="fileInput" class="icon-btn-add">
                        <span>+</span>
                        <input type="file" id="fileInput" accept=".txt">
                    </label>
                </div>
            </div>
            <div class="search-bar">
                <input type="text" id="catalog-search" placeholder="Поиск тестов...">
            </div>
        </header>
        <div class="catalog-container">
            <div id="tests-catalog"></div>
        </div>
    </section>

    <!-- Модальное окно выбора режима -->
    <div id="modal-mode" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 id="modal-test-title">Название теста</h2>
            <div id="test-stats-brief" class="stats-brief"></div>
            
            <div class="exam-settings">
                <span>Кол-во вопросов:</span>
                <input type="number" id="exam-q-count" min="1" value="20">
            </div>

            <div class="mode-options">
                <button id="mode-quiz-btn" class="btn-primary-mode">
                    <span class="btn-icon">📝</span>
                    <div class="btn-text-content">
                        <span class="btn-title">Экзамен</span>
                        <small>Случайный порядок, на оценку</small>
                    </div>
                </button>
                <button id="mode-mistakes-btn" class="btn-accent-mode hidden">
                    <span class="btn-icon">🔥</span>
                    <div class="btn-text-content">
                        <span class="btn-title">Работа над ошибками</span>
                        <small id="mistakes-count-label">0 ошибок найдено</small>
                    </div>
                </button>
                <button id="mode-view-btn" class="btn-secondary-mode">
                    <span class="btn-icon">📖</span>
                    <div class="btn-text-content">
                        <span class="btn-title">Просмотр</span>
                        <small>По порядку, видны ответы</small>
                    </div>
                </button>
            </div>
            <button id="modal-close-btn" class="btn-text-only">Отмена</button>
        </div>
    </div>

    <!-- Экран 2: Тестирование (Экзамен) -->
    <section id="screen-quiz" class="screen hidden">
        <header class="quiz-header">
            <div class="header-top">
                <button class="back-to-catalog icon-btn" title="В меню">✕</button>
                <span id="progress-text"></span>
                <button id="quiz-finish-btn" class="btn-text-danger">Завершить</button>
            </div>
            <div class="progress-bar-container"><div id="progress-fill" class="progress-fill"></div></div>
        </header>
        <div class="quiz-content">
            <div id="question-text"></div>
            <div id="options-container"></div>
        </div>
        <footer class="quiz-footer">
            <button id="quiz-skip-btn" class="btn-secondary">Пропустить</button>
            <button id="quiz-next-btn" class="btn-primary hidden">Далее →</button>
        </footer>
    </section>

    <!-- Экран 4: Режим просмотра (Обучение) -->
    <section id="screen-viewing" class="screen hidden">
        <header class="quiz-header">
            <div class="header-top">
                <button class="back-to-catalog icon-btn">✕</button>
                <span id="view-status">Изучено: 0%</span>
            </div>
            <div id="view-progress-text">Вопрос 1 из 0</div>
            <div class="progress-bar-container"><div id="view-progress-fill" class="progress-fill"></div></div>
        </header>

        <div class="quiz-content has-footer">
            <div id="view-question-text" class="question-text-view"></div>
            <div id="view-options-container" class="options-view"></div>
        </div>
        <footer class="view-toolbar">
            <div class="jump-block">
                <span>Перейти к:</span>
                <input type="number" id="jumpToQuestion" min="1">
                <button id="btn-jump" class="btn-mini">ОК</button>
            </div>
            <div class="nav-buttons">
                <button id="prevQuestionBtn" class="btn-nav-large">⬅ Назад</button>
                <button id="nextQuestionBtn" class="btn-nav-large">Вперед ➡</button>
            </div>
        </footer>
    </section>

    <!-- Экран 3: Результаты -->
    <section id="screen-results" class="screen hidden">
        <div class="content">
            <div class="result-icon">🏆</div>
            <h2>Результат</h2>
            <div class="score-container">
                <span id="score-result">0</span>
                <span class="score-divider">из</span>
                <span id="total-questions">0</span>
            </div>
            <div id="high-score-msg" class="high-score-msg"></div>
            <button id="restartBtn" class="btn-primary">В меню</button>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
